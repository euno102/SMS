services:
  - type: web
    name: smsf-frontend
    env: static
    rootDir: SMSF-main
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
